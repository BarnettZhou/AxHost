<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLI 登录成功 - AxHost</title>
    <script src="/static/js/tailwindcss.js?v=202602131022"></script>
    <link href="/static/css/inter-font.css?v=202602131022" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #f5f5f4 0%, #e7e5e4 100%);
        }
        .success-animation {
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4 text-center">
        <div class="success-animation">
            <div class="w-20 h-20 bg-green-500 rounded-full mx-auto mb-6 flex items-center justify-center">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">🎉 CLI 登录成功</h1>
            <p class="text-gray-600 mb-4">您已成功登录 AxHost CLI</p>
            <div class="bg-gray-50 rounded-lg p-4 mb-6">
                <p class="text-sm text-gray-500">请返回终端查看登录结果</p>
            </div>
            <button onclick="closeWindow()" 
                class="w-full py-3 px-4 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-medium rounded-lg hover:from-orange-700 hover:to-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-all">
                关闭窗口
            </button>
        </div>
    </div>
    
    <script>
        function closeWindow() {
            // 尝试关闭窗口
            window.close();
            
            // 如果无法关闭（可能被浏览器阻止），显示提示
            setTimeout(() => {
                alert('请手动关闭此窗口');
            }, 100);
        }
        
        // 尝试自动关闭窗口（3秒后）
        setTimeout(() => {
            window.close();
        }, 3000);
    </script>
</body>
</html>
